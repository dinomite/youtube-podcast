services:
  youtube-podcast:
    build: .
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=http://localhost:8080
      # Optional: Override Java memory settings
      # - JAVA_OPTS=-Xmx1g -Xms512m
    volumes:
      # Optional: Mount a volume for temporary audio files
      - audio-cache:/tmp
    restart: unless-stopped

volumes:
  audio-cache:
