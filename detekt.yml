config:
  # Enables validation of the Detekt configuration defined in this file
  validation: true

style:
  MaxLineLength:
    # Ktlint is used to enforce max line length
    active: false
  ForbiddenComment:
    active: false
  MagicNumber:
    active: false

naming:
  FunctionNaming:
    # Allow backticks with arbitrary text inside for use in Kotlin test functions
    functionPattern: "([a-z][a-zA-Z0-9]*)|(`.*`)"
