name: Build & test PR
on: [push]
jobs:
    gradle:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-java@v3
              with:
                  distribution: temurin
                  java-version: 21

            - name: Setup Gradle
              uses: gradle/gradle-build-action@v3

            - name: Execute Gradle check
              run: ./gradlew check
