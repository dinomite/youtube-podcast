ktor {
    deployment {
        port = 8080
    }
    application {
        modules = [ net.dinomite.ytpodcast.ApplicationKt.module ]
    }
}

ytpodcast {
    baseUrl = "http://localhost:8080"
    baseDir = "/tmp/ytpodcast"

    cache {
        maxSize = "1GB"
        maxCount = 50
    }

    auth {
        username = "testuser"
        password = "testpass"
    }
}
