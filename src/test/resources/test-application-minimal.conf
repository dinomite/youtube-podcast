# Minimal test configuration without module auto-loading.
#
# This config differs from test-application.conf by NOT including:
#   ktor.application.modules = [ net.dinomite.ytpodcast.ApplicationKt.module ]
#
# This allows tests to explicitly call module() without triggering duplicate plugin
# installation errors that occur when the module is auto-loaded from config.

ktor {
    deployment {
        port = 8080
    }
}

ytpodcast {
    baseUrl = "http://localhost:8080"
    baseDir = "/tmp/ytpodcast"

    cache {
        maxSize = "1GB"
        maxCount = 50
    }

    auth {
        username = "testuser"
        password = "testpass"
    }
}
