ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        # Increase timeouts for large audio file downloads (5 minutes)
        requestReadTimeoutSeconds = 300
        responseWriteTimeoutSeconds = 300
        # Increase max chunk size for large audio files (100 MB)
        maxChunkSize = 104857600
    }
    application {
        modules = [ net.dinomite.ytpodcast.ApplicationKt.module ]
    }
}

ytpodcast {
    baseUrl = ""
    baseUrl = ${?BASE_URL}

    baseDir = ""
    baseDir = ${?BASE_DIR}

    cache {
        maxSize = "5GB"
        maxSize = ${?CACHE_MAX_SIZE}

        maxCount = 100
        maxCount = ${?CACHE_MAX_COUNT}
    }

    auth {
        username = "dev"
        username = ${?AUTH_USERNAME}
        password = "dev"
        password = ${?AUTH_PASSWORD}
    }
}
